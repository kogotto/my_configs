set -g default-terminal "screen-256color"

unbind r
bind r source-file ~/.tmux.conf

set -g mouse on

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# vim-like pane resizing
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

bind -r b last-window

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

#    list of plugins

# better defults
set -g @plugin 'tmux-plugins/tmux-sensible'

# copy to system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# beautyfull colors for status line
set -g @plugin 'dracula/tmux'
set -g @dracula-plugins "cpu-usage ram-usage time battery"
set -g @dracula-show-flags true
set -g @dracula-border-contrast true
set -g @dracula-show-powerline true
set -g @dracula-right-pad false
set -g @dracula-show-edge-icons false
set -g @dracula-show-left-sep 
set -g @dracula-show-right-sep 
set -g @dracula-show-left-icon "#S"
set -g @dracula-left-icon-padding 0
set -g @dracula-cpu-usage-label "󰍛"
set -g @dracula-ram-usage-label ""
set -g @dracula-show-timezone false
set -g @dracula-time-format "%a %e %b %Y %R"
set -g @dracula-battery-label false
set -g @dracula-show-battery-status true

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
