set -g default-terminal "screen-256color"

unbind r
bind r source-file ~/.tmux.conf

set -g mouse on

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# vim-like pane resizing
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

bind -r b last-window

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

#    list of plugins

# better defults
set -g @plugin 'tmux-plugins/tmux-sensible'

# beautyfull colors for status line
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_date_time '%a%e %b %Y %R'
set -g @rose_pine_window_status_separator "  "
set -g @rose_pine_disable_active_window_menu 'on'

# show battery percentage in status line
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @rose_pine_status_right_append_section '#{battery_color_bg} Batt: #{battery_icon} #{battery_percentage} '

# show hint in status bar that prefix is pressed
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @rose_pine_status_left_prepend_section '#{prefix_highlight}'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
